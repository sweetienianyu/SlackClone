services:
  - type: web
    name: slack-app
    runtime: node
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: ""
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: slack-db
    plan: free
    databaseName: slackapp
