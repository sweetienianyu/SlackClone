services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: slack-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-slack-app-demo-secret-change-me}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      - DATABASE_URL=file:./data/prod.db
    volumes:
      - server-data:/app/prisma/data
      - uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: slack-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  server-data:
  uploads:
